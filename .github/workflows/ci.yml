name: CI
on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff pytest
      # Scoped to the reflow module + its tests (the quality-build surface);
      # the other legacy scripts are linted as later steps touch them.
      - run: ruff check reflow.py generate.py glossary.py repair.py tools/ tests/
      - run: pytest
